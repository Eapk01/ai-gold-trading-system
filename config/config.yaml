trading:
  symbol: XAUUSDm
  timeframe: 5m
  position_size: 0.01
  stop_loss_pips: 50.0
  take_profit_pips: 100.0
  confidence_threshold: 0.6
  max_risk: 30
data_sources:
  primary: local_csv
  dataset_directory: data/imports
  min_rows: 100
ai_model:
  type: ensemble
  models:
  - random_forest
  - xgboost
  - logistic_regression
  models_directory: models
  retrain_interval: 168
  lookback_periods: 100
  target_column: Future_Direction_1
features:
  technical_indicators:
  - sma_5
  - sma_20
  - rsi_14
  - macd
  - bollinger_bands
  - atr_14
  market_sentiment:
  - vix
  - dxy
research:
  experiments_directory: reports/experiments
  candidate_models_directory: models/candidates
  defaults:
    common:
      baseline_names:
      - majority_class
      - persistence
      threshold_list:
      - 0.5
      - 0.51
      - 0.52
      - 0.53
      selector_name: correlation
      selector_max_features: 20
      train_fraction: 0.5
      validation_fraction: 0.1
      test_fraction: 0.1
      expanding_window: true
    stage12:
      fixed_feature_set_name: baseline_core
    stage3:
      target_ids:
      - return_threshold_h3_0_05pct
      - legacy_future_direction_1
      feature_set_names:
      - baseline_core
      - momentum
      - volatility
      - context
      - lag_statistical
      - all_eligible
      compare_legacy_target: true
    stage4:
      working_target_id: return_threshold_h3_0_05pct
      feature_set_name: volatility
      comparison_feature_set_name: baseline_core
      trainer_name: current_ensemble
      trainer_params: {}
    stage5:
      target_ids:
      - return_threshold_h3_0_05pct
      - legacy_future_direction_1
      - vol_adjusted_h3_x1_0
      feature_set_names:
      - baseline_core
      - all_eligible
      trainer_name: current_ensemble
      preset_names:
      - conservative
      - balanced
      max_worker_cap: 8
      min_auto_workers: 2
    truth_gate:
      minimum_test_coverage: 0.2
      max_validation_test_f1_drift: 0.1
risk_management:
  max_daily_loss: 30
  max_positions: 3
  risk_per_trade: 0.02
  drawdown_limit: 0.15
backtest:
  start_date: '2023-01-01'
  end_date: '2024-12-31'
  initial_capital: 10000
  commission: 0.0001
  slippage: 0.0002
  signal_confidence_threshold: 0.53
database:
  type: sqlite
  path: data/trading_system.db
logging:
  level: INFO
  file_path: logs/trading_system.log
  max_file_size: 10MB
  backup_count: 5
app:
  startup:
    autoload_latest_model: true
    autoconnect_broker: true
brokers:
  exness:
    enabled: false
    server: ''
    login: ''
    terminal_path: ''
    timeout: 30
    max_retries: 3
  profiles:
    Main:
      broker_type: exness
      login: '262589312'
      password: ''
      server: Exness-MT5Trial16
      terminal_path: ''
      sandbox: false
      account_id: ''
      timeout: 30
      max_retries: 3
  default_profile: Main
live_trading:
  enabled_demo_only: true
  poll_interval_seconds: 5
  inactive_poll_interval_seconds: 30
  signal_confidence_threshold: 0.53
  startup_candle_buffer: 150
  stale_candle_multiplier: 4
  presets: {}
  spacetime_dashboard:
    enabled: false
    sender_script: C:\Users\Bruh\Desktop\Tests\scripts\send-snapshot.ts
    sender_project_dir: C:\Users\Bruh\Desktop\Tests
    npx_command: C:\Program Files\nodejs\npx.cmd
    uri: https://maincloud.spacetimedb.com
    database_name: trading-bot-demo-bruh-20260419
