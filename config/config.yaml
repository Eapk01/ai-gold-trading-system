trading:
  symbol: XAUUSD
  timeframe: 5m
  position_size: 0.01
  stop_loss_pips: 50
  take_profit_pips: 100
  confidence_threshold: 0.6
  max_risk: 30
data_sources:
  primary: local_csv
  backup: oanda
  update_interval: 60
  dataset_directory: data/imports
  min_rows: 100
ai_model:
  type: ensemble
  models:
  - random_forest
  - xgboost
  - logistic_regression
  retrain_interval: 168
  lookback_periods: 100
features:
  technical_indicators:
  - sma_5
  - sma_20
  - rsi_14
  - macd
  - bollinger_bands
  - atr_14
  market_sentiment:
  - vix
  - dxy
risk_management:
  max_daily_loss: 30
  max_positions: 3
  risk_per_trade: 0.02
  drawdown_limit: 0.15
backtest:
  start_date: '2023-01-01'
  end_date: '2024-12-31'
  initial_capital: 10000
  commission: 0.0001
  slippage: 0.0002
database:
  type: sqlite
  path: data/trading_system.db
logging:
  level: INFO
  file_path: logs/trading_system.log
  max_file_size: 10MB
  backup_count: 5
